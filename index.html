<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be the LLM — Claude Code 体験クイズ</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#d97757; --accent2:#e8a87c;
    --green:#3fb950; --red:#f85149; --blue:#58a6ff; --purple:#bc8cff;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--mono);
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:14px; padding:10px 16px;
    border-bottom:1px solid var(--border); background:var(--panel); flex:0 0 auto;
  }
  header .logo{font-weight:700; color:var(--accent); font-size:15px; letter-spacing:.3px;}
  header .logo small{color:var(--muted); font-weight:400;}
  header .spacer{flex:1;}
  .levelpick{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:5px 8px; font-family:var(--mono); font-size:12px;
  }
  .stat{font-size:12px; color:var(--muted);}
  .stat b{color:var(--text);}
  button{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:6px 11px; font-family:var(--mono); font-size:12px; cursor:pointer;
  }
  button:hover{border-color:var(--accent); color:var(--accent2);}
  button.primary{background:var(--accent); color:#1b1206; border-color:var(--accent); font-weight:700;}
  button.primary:hover{background:var(--accent2); color:#1b1206;}

  main{flex:1 1 auto; display:flex; min-height:0;}
  .left{flex:1 1 62%; display:flex; flex-direction:column; min-width:0; border-right:1px solid var(--border);}
  .right{flex:0 0 360px; display:flex; flex-direction:column; min-width:0; background:var(--panel);}

  .convo{flex:1 1 auto; overflow-y:auto; padding:16px 18px;}
  .msg{margin-bottom:14px; max-width:100%;}
  .msg .role{font-size:11px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.6px;}
  .bubble{padding:11px 13px; border-radius:8px; border:1px solid var(--border); white-space:pre-wrap; word-break:break-word; font-size:13px; line-height:1.55;}
  .user .bubble{background:#1d1b2e; border-color:#3a2f5c;}
  .user .role{color:var(--purple);}
  .assistant .role{color:var(--accent);}
  .assistant .bubble{background:#1a1410; border-color:#4a2f1d;}
  .result .role{color:var(--blue);}
  .result .bubble{background:#0e1620; border-color:#1f3650; color:#cfe5ff;}
  .result.err .bubble{background:#23110f; border-color:#5a1f1c; color:#ffd0cb;}
  .result .bubble .ok{color:var(--green);}
  .warn .role{color:var(--accent2);}
  .warn .bubble{background:#241c0c; border-color:#6b4f12; color:#ffe6b0;}
  .toolcall-json{font-size:12.5px;}
  .tag{display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px; background:#0e1620; border:1px solid var(--border); color:var(--muted); margin-left:6px;}

  .winbanner{margin:4px 0 14px; padding:13px 15px; border-radius:8px; background:#0f2a16; border:1px solid var(--green); color:#b7f5c3;}
  .winbanner h3{margin:0 0 6px; color:var(--green); font-size:14px;}
  .winbanner .par{color:var(--muted); font-size:12px;}

  .inputbar{flex:0 0 auto; border-top:1px solid var(--border); padding:10px 12px; background:var(--panel);}
  .inputbar .hint{font-size:11px; color:var(--muted); margin-bottom:6px;}
  textarea#input{
    width:100%; height:130px; resize:vertical; background:var(--bg); color:var(--text);
    border:1px solid var(--border); border-radius:8px; padding:10px 11px; font-family:var(--mono);
    font-size:13px; line-height:1.5; tab-size:2;
  }
  textarea#input:focus{outline:none; border-color:var(--accent);}
  .inputrow{display:flex; gap:8px; margin-top:8px; align-items:center;}
  .inputrow .spacer{flex:1;}
  .inputrow .kbd{font-size:11px; color:var(--muted);}

  .right h2{font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:0; padding:12px 14px 8px;}
  .tools{overflow-y:auto; flex:1 1 auto; padding:0 12px 14px;}
  .tool{border:1px solid var(--border); border-radius:8px; margin-bottom:9px; overflow:hidden; background:var(--panel2);}
  .tool .thead{display:flex; align-items:center; gap:8px; padding:9px 11px; cursor:pointer;}
  .tool .tname{color:var(--accent2); font-size:13px; font-weight:700;}
  .tool.mcp .tname{color:var(--purple);}
  .tool .tdesc{font-size:11px; color:var(--muted); padding:0 11px 9px; margin-top:-3px;}
  .tool .schema{border-top:1px solid var(--border); padding:9px 11px; font-size:11.5px; color:#cfe5ff; background:#0e1620; white-space:pre-wrap; display:none;}
  .tool.open .schema{display:block;}
  .tool .tmpl{margin:0 11px 10px; font-size:11px; padding:4px 9px;}
  .chev{margin-left:auto; color:var(--muted); font-size:11px;}

  .convo::-webkit-scrollbar,.tools::-webkit-scrollbar{width:9px;}
  .convo::-webkit-scrollbar-thumb,.tools::-webkit-scrollbar-thumb{background:#2a313c; border-radius:5px;}
  a.link{color:var(--blue); cursor:pointer; text-decoration:underline;}
</style>
</head>
<body>
<header>
  <div class="logo">▮ Be the LLM <small>— あなたがモデルになって tool_use を書く</small></div>
  <div class="spacer"></div>
  <span class="stat">Lv <b id="lvNum">1</b>/<span id="lvTotal">6</span></span>
  <span class="stat">turns <b id="turns">0</b></span>
  <span class="stat">calls <b id="calls">0</b> <span style="color:var(--muted)">/ par <span id="par">-</span></span></span>
  <span class="stat" id="budgetStat" style="display:none">budget <b id="budget">-</b></span>
  <select class="levelpick" id="levelpick"></select>
  <button id="restart">リセット</button>
  <button id="help">?</button>
</header>

<main>
  <div class="left">
    <div class="convo" id="convo"></div>
    <div class="inputbar">
      <div class="hint">tool_use を JSON で記述 → <b>Ctrl/⌘ + Enter</b> で送信。1個なら単体オブジェクト、複数同時(並列)なら配列。</div>
      <textarea id="input" spellcheck="false" placeholder='{
  "name": "Read",
  "input": { "file_path": "/workspace/secret.txt" }
}'></textarea>
      <div class="inputrow">
        <span class="kbd">例: <a class="link" id="ex1">単体呼び出し</a> · <a class="link" id="ex2">並列(配列)呼び出し</a></span>
        <span class="spacer"></span>
        <button id="clearin">クリア</button>
        <button class="primary" id="send">送信 ⏎</button>
      </div>
    </div>
  </div>
  <div class="right">
    <h2>このレベルで使えるツール</h2>
    <div class="tools" id="toolsPanel"></div>
  </div>
</main>

<script>
/* =========================================================================
   仮想ファイルシステム + 簡易シェルのヘルパー
   ========================================================================= */
function resolvePath(env, p){
  if(p===undefined||p===null||p==="") return env.cwd;
  let abs = p.startsWith("/") ? p : (env.cwd==="/" ? "/"+p : env.cwd+"/"+p);
  const stack=[];
  for(const part of abs.split("/")){
    if(part===""||part===".") continue;
    else if(part==="..") stack.pop();
    else stack.push(part);
  }
  return "/"+stack.join("/");
}
function isDir(env, path){
  path = path==="/"?"/":path.replace(/\/$/,"");
  const pre = path==="/"?"/":path+"/";
  return Object.keys(env.files).some(f=>f.startsWith(pre));
}
function listDir(env, path){
  path = path==="/"?"/":path.replace(/\/$/,"");
  const pre = path==="/"?"/":path+"/";
  const set = new Set();
  for(const f of Object.keys(env.files)){
    if(!f.startsWith(pre)) continue;
    const rest = f.slice(pre.length);
    const seg = rest.split("/")[0];
    set.add(seg + (rest.includes("/") ? "/" : ""));
  }
  return [...set].sort();
}
function numberLines(content){
  return content.replace(/\n$/,"").split("\n")
    .map((l,i)=> String(i+1).padStart(6," ")+"\t"+l).join("\n");
}
function tokenize(s){
  const re=/"([^"]*)"|'([^']*)'|(\S+)/g, out=[]; let m;
  while((m=re.exec(s))) out.push(m[1]!==undefined?m[1]:(m[2]!==undefined?m[2]:m[3]));
  return out;
}
function runBash(cmd, env){
  const t = tokenize((cmd||"").trim());
  if(t.length===0) return {ok:true, out:""};
  const c=t[0], a=t.slice(1);
  if(c==="pwd") return {ok:true, out:env.cwd};
  if(c==="echo") return {ok:true, out:a.join(" ")};
  if(c==="cd"){
    const p=resolvePath(env,a[0]||"/");
    if(!isDir(env,p)&&p!=="/") return {ok:false,out:`cd: ${a[0]}: No such directory`};
    env.cwd=p||"/"; return {ok:true,out:""};
  }
  if(c==="ls"){
    const target = a.find(x=>!x.startsWith("-"));
    const p=resolvePath(env,target);
    if(p in env.files) return {ok:true,out:p.split("/").pop()};
    if(isDir(env,p)||p==="/") return {ok:true,out:listDir(env,p).join("\n")};
    return {ok:false,out:`ls: ${target||p}: No such file or directory`};
  }
  if(c==="cat"){
    if(!a.length) return {ok:false,out:"cat: missing file operand"};
    const p=resolvePath(env,a[0]);
    if(p in env.files) return {ok:true,out:env.files[p]};
    return {ok:false,out:`cat: ${a[0]}: No such file or directory`};
  }
  if(c==="wc"){
    const fileArg=a.find(x=>!x.startsWith("-"));
    const p=resolvePath(env,fileArg);
    if(!(p in env.files)) return {ok:false,out:`wc: ${fileArg}: No such file or directory`};
    const n=env.files[p].replace(/\n$/,"").split("\n").length;
    return {ok:true,out:`${n} ${fileArg}`};
  }
  if(c==="grep"){
    const recursive=a.some(x=>/^-.*r/.test(x));
    const rest=a.filter(x=>!x.startsWith("-"));
    const pattern=rest[0], targetArg=rest[1];
    if(pattern===undefined) return {ok:false,out:"usage: grep PATTERN FILE"};
    const lines=[];
    const scan=(path)=>{
      env.files[path].replace(/\n$/,"").split("\n").forEach(line=>{
        if(line.includes(pattern)) lines.push(recursive?`${path}:${line}`:line);
      });
    };
    if(recursive){
      const base=resolvePath(env,targetArg||".");
      Object.keys(env.files).filter(f=>f===base||f.startsWith((base==="/"?"/":base+"/"))).forEach(scan);
    } else {
      const p=resolvePath(env,targetArg);
      if(!(p in env.files)) return {ok:false,out:`grep: ${targetArg}: No such file or directory`};
      scan(p);
    }
    return {ok:true, out: lines.join("\n")};
  }
  return {ok:false, out:`bash: ${c}: command not found  (使えるのは ls / cat / grep / wc / pwd / cd / echo)`};
}

/* =========================================================================
   ツール定義（schema + 実行関数）。ハーネスが本来 API に渡すものと同じ形。
   ========================================================================= */
const TOOLS = {
  Read:{
    description:"ファイルを読む。大きいファイルは先頭だけ表示される（残りは Grep で検索）。",
    input_schema:{type:"object",
      properties:{file_path:{type:"string",description:"絶対パス推奨"}},
      required:["file_path"]},
    run:(input,env)=>{
      const p=resolvePath(env,input.file_path);
      if(isDir(env,p)) return {ok:false,out:`Error: ${p} はディレクトリです`};
      if(!(p in env.files)) return {ok:false,out:`Error: file not found: ${p}`};
      const lines=env.files[p].replace(/\n$/,"").split("\n");
      const LIMIT=40;
      if(lines.length>LIMIT){
        const head=lines.slice(0,30).map((l,i)=>String(i+1).padStart(6," ")+"\t"+l).join("\n");
        return {ok:true,out:head+`\n... [${lines.length-30} 行を省略 / truncated]  全部は表示されません。Grep ツールで pattern を検索すれば、必要な行だけ取り出せます。`};
      }
      return {ok:true,out:numberLines(env.files[p])};
    }
  },
  Bash:{
    description:"シェルを実行。ls=一覧 / cat=表示 / grep=検索 / wc=行数 / pwd / cd / echo。",
    input_schema:{type:"object",
      properties:{command:{type:"string"},description:{type:"string"}},
      required:["command"]},
    run:(input,env)=>runBash(input.command,env)
  },
  Grep:{
    description:"ファイルの中身を検索する。path（ファイルまたはフォルダ）以下から pattern を含む行を返す。大きいファイルを全部読まずに必要な箇所だけ取り出せる。",
    input_schema:{type:"object",
      properties:{
        pattern:{type:"string",description:"探したい文字列"},
        path:{type:"string",description:"検索対象のファイルまたはフォルダの絶対パス"}
      },
      required:["pattern","path"]},
    run:(input,env)=>{
      const base=resolvePath(env,input.path);
      const targets=Object.keys(env.files).filter(f=> f===base || f.startsWith(base==="/"?"/":base+"/"));
      if(targets.length===0) return {ok:false,out:`Error: no such file or directory: ${base}`};
      const lines=[];
      for(const f of targets){
        env.files[f].replace(/\n$/,"").split("\n").forEach(line=>{
          if(line.includes(input.pattern)) lines.push(`${f}:${line}`);
        });
      }
      return {ok:true, out: lines.length?lines.join("\n"):`(no matches for "${input.pattern}")`};
    }
  },
  Edit:{
    description:"ファイル内の文字列を置換する。old_string はファイル内で一意でなければならない。",
    input_schema:{type:"object",
      properties:{
        file_path:{type:"string"},
        old_string:{type:"string"},
        new_string:{type:"string"},
        replace_all:{type:"boolean"}
      },
      required:["file_path","old_string","new_string"]},
    run:(input,env)=>{
      const p=resolvePath(env,input.file_path);
      if(!(p in env.files)) return {ok:false,out:`Error: file not found: ${p}`};
      if(input.old_string===input.new_string) return {ok:false,out:"Error: old_string と new_string が同一です"};
      const content=env.files[p];
      const count=content.split(input.old_string).length-1;
      if(count===0) return {ok:false,out:"Error: old_string がファイル内に見つかりません"};
      if(count>1 && !input.replace_all) return {ok:false,out:`Error: old_string is not unique (${count} matches). replace_all:true にするか、前後の文脈を足して一意にしてください。`};
      env.files[p]= input.replace_all ? content.split(input.old_string).join(input.new_string)
                                       : content.replace(input.old_string,input.new_string);
      const n=input.replace_all?count:1;
      return {ok:true,out:`Edited ${p} (${n} replacement${n>1?"s":""})`};
    }
  },
  Write:{
    description:"ファイルを新規作成または上書きする。",
    input_schema:{type:"object",
      properties:{file_path:{type:"string"},content:{type:"string"}},
      required:["file_path","content"]},
    run:(input,env)=>{
      const p=resolvePath(env,input.file_path);
      const existed=p in env.files;
      env.files[p]=input.content;
      return {ok:true,out:`${existed?"Overwrote":"Created"} ${p} (${input.content.length} bytes)`};
    }
  },
  submit_answer:{
    description:"課題の最終回答を提出する。",
    input_schema:{type:"object",
      properties:{answer:{type:"string",description:"回答文字列"}},
      required:["answer"]},
    run:(input,env)=>{ env.submitted=String(input.answer); return {ok:true,out:`回答を提出: "${input.answer}"`}; }
  },
  "mcp__weather__get_forecast":{
    mcp:true,
    description:"[MCP] weather サーバー経由で天気予報を取得する。",
    input_schema:{type:"object",
      properties:{location:{type:"string",description:"都市名"}},
      required:["location"]},
    run:(input,env)=>{
      const db={Tokyo:{temp_c:22,condition:"Sunny"},Osaka:{temp_c:25,condition:"Cloudy"},Sapporo:{temp_c:14,condition:"Rain"}};
      const d=db[input.location];
      if(!d) return {ok:false,out:`Error: unknown location "${input.location}" (try Tokyo / Osaka / Sapporo)`};
      return {ok:true,out:JSON.stringify({location:input.location,...d},null,2)};
    }
  },
  send_http:{
    description:"[network] 指定 URL へ HTTP POST する。外部サーバーへデータを送信する。",
    input_schema:{type:"object",
      properties:{url:{type:"string"},data:{type:"string"}},
      required:["url","data"]},
    run:(input,env)=>({ok:true,out:`POST ${input.url}\n→ 200 OK`})
  }
};

/* =========================================================================
   レベル定義
   ========================================================================= */
function noisyLog(){
  const out=["[boot] starting auth-service v2.3.1","[boot] reading environment"];
  for(let i=0;i<60;i++){
    out.push(`[init] module-${String(i).padStart(2,"0")} initialized in ${i*3+5}ms`);
    if(i===37) out.push("[boot] loading config from /etc/feature_flags.json");
  }
  out.push("[boot] ready, listening on :8080");
  return out.join("\n")+"\n";
}

const LEVELS = [
  {
    title:"First contact — Read で読む",
    task:`ようこそ。あなたは今 Claude Code につながった LLM です。\n\nファイル /workspace/secret.txt にパスワードが書かれています。\nそれを Read で読み取り、submit_answer で提出してください。`,
    tools:["Read","submit_answer"],
    par:2,
    files:{"/workspace/secret.txt":"# このファイルは共有しないこと\nThe password is: hunter2\n"},
    check:e=> (e.submitted||"").trim()==="hunter2",
    solution:`{ "name": "Read", "input": { "file_path": "/workspace/secret.txt" } }\n→ 結果を読んで\n{ "name": "submit_answer", "input": { "answer": "hunter2" } }`
  },
  {
    title:"Explore — Bash で探索する",
    task:`/project の中のどこかに API キー (API_KEY=...) を含むファイルがあります。\nBash の grep などで探し出し、キーの値を submit_answer で提出してください。`,
    tools:["Grep","Bash","Read","submit_answer"],
    par:2,
    files:{
      "/project/README.md":"# My Project\nstart with: node src/index.js\n",
      "/project/src/index.js":"import { boot } from './app.js';\nboot();\n",
      "/project/src/app.js":"export function boot(){ console.log('up'); }\n",
      "/project/config/.env":"PORT=3000\nAPI_KEY=sk-live-9f3a2b\nDEBUG=false\n"
    },
    check:e=> (e.submitted||"").trim()==="sk-live-9f3a2b",
    solution:`{ "name": "Bash", "input": { "command": "grep -r API_KEY /project" } }\n→ /project/config/.env:API_KEY=sk-live-9f3a2b\n{ "name": "submit_answer", "input": { "answer": "sk-live-9f3a2b" } }`
  },
  {
    title:"Fix the bug — Edit で修正する",
    task:`/src/math.js に typo があります。"fucntion" を "function" に直してください。\n(submit は不要。ファイルが正しくなれば合格)`,
    tools:["Read","Edit"],
    par:2,
    files:{"/src/math.js":"export fucntion add(a, b) {\n  return a + b;\n}\n"},
    check:e=>{const c=e.files["/src/math.js"]||""; return c.includes("function add")&&!c.includes("fucntion");},
    solution:`{ "name": "Read", "input": { "file_path": "/src/math.js" } }\n{ "name": "Edit", "input": { "file_path": "/src/math.js", "old_string": "fucntion", "new_string": "function" } }`
  },
  {
    title:"Multi-step — 読んで・直して・作る",
    task:`2つやることがあります:\n  1) /app/config.json の "env" を "development" から "production" に変更\n  2) /app/STATUS というファイルを新規作成し、中身を ready にする`,
    tools:["Read","Edit","Write"],
    par:3,
    files:{"/app/config.json":'{\n  "env": "development",\n  "retries": 3\n}\n'},
    check:e=>{
      const c=e.files["/app/config.json"]||"";
      return c.includes('"production"') && ((e.files["/app/STATUS"]||"").trim()==="ready");
    },
    solution:`{ "name": "Edit", "input": { "file_path": "/app/config.json", "old_string": "development", "new_string": "production" } }\n{ "name": "Write", "input": { "file_path": "/app/STATUS", "content": "ready" } }`
  },
  {
    title:"MCP tool — 外部ツールを呼ぶ",
    task:`MCP サーバー経由のツール mcp__weather__get_forecast を使い、\nTokyo の予報を取得して、気温(摂氏の数値だけ)を submit_answer で提出してください。\n\n※ mcp__ で始まっても、モデルから見れば Bash 等と同じ tool_use です。`,
    tools:["mcp__weather__get_forecast","submit_answer"],
    par:2,
    files:{},
    check:e=> (e.submitted||"").trim()==="22",
    solution:`{ "name": "mcp__weather__get_forecast", "input": { "location": "Tokyo" } }\n→ "temp_c": 22\n{ "name": "submit_answer", "input": { "answer": "22" } }`
  },
  {
    title:"Parallel — 1ターンで並列呼び出し",
    task:`効率の話。モデルは1ターンで複数の tool_use を同時に出せます(=並列ツール呼び出し)。\n\n/a.txt と /b.txt を「1つの配列で2つの Read」として同時に読み、\n中身を "-" で連結して submit_answer で提出してください (例: alpha-bravo)。\n\n配列で送ると turns は増えずに済みます。`,
    tools:["Read","submit_answer"],
    par:3,

/* =========================================================================
   ゲーム状態 & 描画
   ========================================================================= */
const state={ lv:0, env:null, turns:0, calls:0, solved:false, incidents:0, budgetWarned:false };
const $=id=>document.getElementById(id);

function loadLevel(i){
  state.lv=i;
  const L=LEVELS[i];
  state.env={files:JSON.parse(JSON.stringify(L.files)), cwd:"/", submitted:null};
  state.turns=0; state.calls=0; state.solved=false; state.incidents=0; state.budgetWarned=false;
  $("convo").innerHTML="";
  pushMessage("user", `[Level ${i+1}] ${L.title}\n\n${L.task}`);
  renderTools();
  updateStats();
  $("input").focus();
  try{ localStorage.setItem("btl_lv", String(i)); }catch(_){}
}
function updateStats(){
  $("lvNum").textContent=state.lv+1;
  $("turns").textContent=state.turns;
  $("calls").textContent=state.calls;
  $("par").textContent=LEVELS[state.lv].par;
  const b=LEVELS[state.lv].budget, bs=$("budgetStat");
  if(b){ bs.style.display=""; $("budget").textContent=b; bs.style.color=state.calls>b?"var(--red)":""; }
  else bs.style.display="none";
  $("levelpick").value=String(state.lv);
}
function pushMessage(role, text, isError){
  const c=$("convo");
  const wrap=document.createElement("div");
  wrap.className="msg "+role+(isError?" err":"");
  const label={user:"user",assistant:"assistant (you)",result:"tool_result",warn:"⚠ harness note"}[role]||role;
  wrap.innerHTML=`<div class="role">${label}</div><div class="bubble"></div>`;
  wrap.querySelector(".bubble").textContent=text;
  c.appendChild(wrap); c.scrollTop=c.scrollHeight;
  return wrap;
}
function pushAssistantCalls(calls){
  const c=$("convo");
  const wrap=document.createElement("div");
  wrap.className="msg assistant";
  const json=JSON.stringify(calls.length===1?calls[0]:calls,null,2);
  wrap.innerHTML=`<div class="role">assistant (you) <span class="tag">${calls.length} tool_use</span></div><div class="bubble toolcall-json"></div>`;
  wrap.querySelector(".bubble").textContent=json;
  c.appendChild(wrap); c.scrollTop=c.scrollHeight;
}
function pushWin(){
  const L=LEVELS[state.lv];
  const c=$("convo");
  const last = state.lv===LEVELS.length-1;
  const wrap=document.createElement("div");
  wrap.className="winbanner";
  let note=`tool calls: <b>${state.calls}</b> (par ${L.par}) · turns: ${state.turns}`;
  if(L.budget) note += state.calls<=L.budget ? ` · budget ${L.budget} 達成 ✅` : ` · budget ${L.budget} 超過 ⚠`;
  if(state.calls<=L.par) note += " — 効率的！";
  const inc = state.incidents>0 ? `<div class="par" style="color:var(--red)">🚨 セキュリティインシデント ${state.incidents} 件（クリアはしたが、本番なら事故）</div>` : "";
  wrap.innerHTML=`<h3>✓ 解決しました！</h3><div class="par">${note}</div>${inc}`;
  const btn=document.createElement("button");
  btn.className="primary"; btn.style.marginTop="10px";
  btn.textContent= last ? "全レベルクリア — 最初に戻る" : "次のレベルへ →";
  btn.onclick=()=> loadLevel(last?0:state.lv+1);
  wrap.appendChild(btn);
  c.appendChild(wrap); c.scrollTop=c.scrollHeight;
}

/* ---- ツールパネル ---- */
function renderTools(){
  const panel=$("toolsPanel"); panel.innerHTML="";
  for(const name of LEVELS[state.lv].tools){
    const t=TOOLS[name];
    const div=document.createElement("div");
    div.className="tool"+(t.mcp?" mcp":"");
    div.innerHTML=`
      <div class="thead"><span class="tname">${name}</span><span class="chev">▸ schema</span></div>
      <div class="tdesc">${t.description}</div>
      <pre class="schema">${JSON.stringify(t.input_schema,null,2).replace(/</g,"&lt;")}</pre>
      <button class="tmpl">テンプレを入力欄へ</button>`;
    div.querySelector(".thead").onclick=()=>{
      div.classList.toggle("open");
      div.querySelector(".chev").textContent=div.classList.contains("open")?"▾ schema":"▸ schema";
    };
    div.querySelector(".tmpl").onclick=()=>{ $("input").value=templateFor(name); $("input").focus(); };
    panel.appendChild(div);
  }
}
function templateFor(name){
  const t=TOOLS[name], input={};
  for(const k of (t.input_schema.required||[])){
    const ty=t.input_schema.properties[k].type;
    input[k]= ty==="boolean"?false : ty==="number"?0 : "";
  }
  return JSON.stringify({name,input},null,2);
}

/* =========================================================================
   バリデーション + 実行（ここが「ハーネス」役の核）
   ========================================================================= */
function normalizeCall(call){
  if(typeof call!=="object"||call===null||Array.isArray(call))
    return {err:'各 tool call は "name" と "input" を持つ JSON オブジェクトである必要があります'};
  if(typeof call.name!=="string") return {err:'tool call に文字列の "name" がありません'};
  let input = call.input!==undefined ? call.input : call.arguments;
  if(input===undefined) input={};
  if(typeof input!=="object"||Array.isArray(input)) return {err:'"input" はオブジェクトである必要があります'};
  return {name:call.name, input};
}
function validateInput(tool, input){
  const errs=[], sch=tool.input_schema;
  for(const req of (sch.required||[])) if(!(req in input)) errs.push(`必須プロパティ "${req}" がありません`);
  for(const [k,v] of Object.entries(input)){
    const ps=sch.properties[k];
    if(!ps){ errs.push(`未知のプロパティ "${k}"`); continue; }
    const actual=Array.isArray(v)?"array":typeof v;
    const allowNumAsStr = ps.type==="string" && actual==="number";
    if(ps.type && ps.type!==actual && !allowNumAsStr)
      errs.push(`プロパティ "${k}" は ${ps.type} 型である必要があります (実際: ${actual})`);
  }
  return errs;
}

function send(){
  if(state.solved) return;
  const raw=$("input").value.trim();
  if(!raw) return;
  let parsed;
  try{ parsed=JSON.parse(raw); }
  catch(e){
    pushMessage("result", `Invalid JSON — パースに失敗しました\n${e.message}\n\nヒント: 末尾カンマ・クォート忘れ・全角文字に注意。`, true);
    return;
  }
  const calls = Array.isArray(parsed)?parsed:[parsed];
  if(calls.length===0){ pushMessage("result","tool call が空です",true); return; }

  pushAssistantCalls(calls);
  state.turns++;

  const L=LEVELS[state.lv];
  const available=L.tools;
  const executed=[];
  for(const rawCall of calls){
    const norm=normalizeCall(rawCall);
    if(norm.err){ state.calls++; pushMessage("result","ToolUseError: "+norm.err,true); continue; }
    state.calls++;
    if(!available.includes(norm.name)){
      const known=Object.keys(TOOLS);
      const hint=known.includes(norm.name)?"（存在するがこのレベルでは未提供）":"";
      pushMessage("result",`Error: tool "${norm.name}" は使えません ${hint}\n使えるツール: ${available.join(", ")}`,true);
      continue;
    }
    const tool=TOOLS[norm.name];
    const verrs=validateInput(tool,norm.input);
    if(verrs.length){
      pushMessage("result",`InputValidationError [${norm.name}]\n- `+verrs.join("\n- "),true);
      continue;
    }
    const res=tool.run(norm.input, state.env);
    executed.push({name:norm.name, input:norm.input});
    pushMessage("result", (res.out===""?"(empty output)":res.out), !res.ok);
  }

  // 教材的トラップ（やさしめ: 失格にせず警告して続行）
  if(L.traps){
    for(const w of L.traps(executed, state.env)){
      pushMessage("warn", w.msg);
      if(w.incident) state.incidents++;
    }
  }

  // トークン予算（ソフト: 超えても続行できるが一度だけ注意）
  if(L.budget && state.calls>L.budget && !state.budgetWarned){
    state.budgetWarned=true;
    pushMessage("warn", `⚠ 予算オーバー: budget ${L.budget} calls に対し ${state.calls} calls 使用。\n1ファイルずつ Read する代わりに、Grep ツールなら複数ファイルを1回でまとめて検索できます。`);
  }

  updateStats();
  if(L.check(state.env)){
    state.solved=true;
    pushWin();
  }
}

/* =========================================================================
   イベント配線 & 初期化
   ========================================================================= */
$("send").onclick=send;
$("input").addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){ e.preventDefault(); send(); }
});
$("clearin").onclick=()=>{ $("input").value=""; $("input").focus(); };
$("restart").onclick=()=>loadLevel(state.lv);
$("ex1").onclick=()=>{ $("input").value='{\n  "name": "Read",\n  "input": { "file_path": "/workspace/secret.txt" }\n}'; };
$("ex2").onclick=()=>{ $("input").value='[\n  { "name": "Read", "input": { "file_path": "/a.txt" } },\n  { "name": "Read", "input": { "file_path": "/b.txt" } }\n]'; };
$("help").onclick=()=>{
  alert(
`Be the LLM — 遊び方

あなたは Claude Code につながった LLM です。
人間(ハーネス)が課題と使えるツール定義を渡してきます。
あなたは tool_use を JSON で書いて返すだけ。

・形式: { "name": "<ツール名>", "input": { ...引数... } }
・複数同時(並列)に呼ぶなら配列: [ {...}, {...} ]
・送信は Ctrl/⌘ + Enter
・右パネルの schema を開くと引数の型がわかります
・"テンプレを入力欄へ" で雛形を挿入できます

ハーネスは本物っぽく検証します:
  JSON パースエラー / 未知ツール / 必須プロパティ欠落 /
  型不一致 / Edit の old_string が一意でない ... など。

課題の達成条件を満たせばクリア。tool call 数(par)が
少ないほど効率的=トークン効率が良い、という気持ちで。`);
};

// レベルセレクタ
LEVELS.forEach((L,i)=>{
  const o=document.createElement("option");
  o.value=String(i); o.textContent=`Lv ${i+1}: ${L.title}`;
  $("levelpick").appendChild(o);
});
$("lvTotal").textContent=LEVELS.length;
$("levelpick").onchange=e=>loadLevel(Number(e.target.value));

let start=0;
try{ const s=Number(localStorage.getItem("btl_lv")); if(s>=0&&s<LEVELS.length) start=s; }catch(_){}
loadLevel(start);
</script>
